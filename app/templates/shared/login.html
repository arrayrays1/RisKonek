<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --rk-green: #10b981;
            --rk-green-mid: #059669;
            --rk-green-dark: #047857;
        }
        html, body {
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(160deg, #ecfdf5 0%, #f4f6f9 45%, #e8f4fd 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }
        /* Soft abstract decoration in place of a photo backdrop */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            z-index: 0;
        }
        body::before {
            width: 420px; height: 420px;
            background: var(--rk-green);
            top: -120px; left: -120px;
        }
        body::after {
            width: 480px; height: 480px;
            background: #2980b9;
            bottom: -160px; right: -140px;
        }

        .login-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 920px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(16,24,40,0.16);
            display: flex;
            overflow: hidden;
            min-height: 520px;
        }

        /* ── Left brand panel ─────────────────────────────────────── */
        .login-brand {
            flex: 1 1 46%;
            background: linear-gradient(160deg, var(--rk-green-mid) 0%, var(--rk-green-dark) 100%);
            color: white;
            padding: 48px 40px;
            display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }
        .login-brand .emblem {
            width: 88px; height: 88px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18);
            margin-bottom: 28px;
        }
        .login-brand .emblem i {
            font-size: 38px;
            color: var(--rk-green-dark);
        }
        .login-brand h1 {
            font-size: 28px; font-weight: 800; margin: 0 0 6px;
            line-height: 1.25;
        }
        .login-brand h1 .accent { color: #fbbf24; }
        .login-brand .tagline {
            font-size: 14px; color: rgba(255,255,255,0.85);
            margin-bottom: 28px;
        }
        .login-brand .divider {
            border-top: 1px solid rgba(255,255,255,0.25);
            margin-bottom: 22px;
        }
        .login-brand .footer-loc {
            font-size: 13px; font-weight: 700;
        }
        .login-brand .footer-office {
            font-size: 12px; color: rgba(255,255,255,0.7);
        }

        /* ── Right form panel ─────────────────────────────────────── */
        .login-form-panel {
            flex: 1 1 54%;
            padding: 48px 44px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .login-form-panel h3 {
            font-size: 21px; font-weight: 700; margin-bottom: 4px;
        }
        .login-form-panel .subtext {
            font-size: 13px; color: #6c757d; margin-bottom: 26px;
        }
        .form-label-rk {
            font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block;
        }
        .input-group-rk {
            margin-bottom: 18px;
        }
        .input-group-rk .input-group-text {
            background: white; border-right: 0; color: #9ca3af;
            border-radius: 10px 0 0 10px;
        }
        .input-group-rk .form-control {
            border-left: 0; border-radius: 0 10px 10px 0; padding: 11px 12px;
        }
        .input-group-rk .form-control:focus { box-shadow: none; border-color: #ced4da; }
        .input-group-rk .toggle-pw {
            background: white; border-left: 0; color: #9ca3af; cursor: pointer;
        }
        .forgot-pw {
            font-size: 12.5px; color: #9ca3af; text-decoration: none;
            cursor: default;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--rk-green), var(--rk-green-dark));
            color: white; border: none; border-radius: 10px;
            padding: 12px; font-weight: 600; font-size: 15px;
            box-shadow: 0 4px 14px rgba(4,120,87,0.3);
        }
        .btn-login:hover { color: white; background: linear-gradient(135deg, var(--rk-green-mid), var(--rk-green-dark)); }

        @media (max-width: 760px) {
            .login-shell { flex-direction: column; min-height: auto; }
            .login-brand { padding: 36px 32px; }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-brand">
            <div class="emblem"><i class="bi bi-shield-fill-check"></i></div>
            <h1>Welcome to <span class="accent">RisKonek</span></h1>
            <div class="tagline">Disaster Risk Management System</div>
            <div class="divider"></div>
            <div class="footer-loc">San Pedro, Laguna</div>
            <div class="footer-office">City Disaster Risk Reduction Management Office</div>
        </div>

        <div class="login-form-panel">
            <h3>Login to your account</h3>
            <div class="subtext">Enter your credentials to access the system</div>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show py-2" role="alert" style="font-size:13px">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <label class="form-label-rk">Username</label>
                <div class="input-group input-group-rk">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="username" required autofocus autocomplete="username">
                </div>

                <label class="form-label-rk">Password</label>
                <div class="input-group input-group-rk">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" id="pwInput" class="form-control"
                           placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="input-group-text toggle-pw" id="togglePw" tabindex="-1" aria-label="Show password">
                        <i class="bi bi-eye" id="togglePwIcon"></i>
                    </button>
                </div>

                <div class="d-flex justify-content-end mb-3">
                    <span class="forgot-pw" title="Account recovery isn't available yet — please contact your system administrator.">
                        Forgot your password? Contact your administrator
                    </span>
                </div>

                <button type="submit" class="btn btn-login w-100">Login</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            var btn = document.getElementById('togglePw');
            var input = document.getElementById('pwInput');
            var icon = document.getElementById('togglePwIcon');
            btn.addEventListener('click', function () {
                var show = input.type === 'password';
                input.type = show ? 'text' : 'password';
                icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
            });
        })();
    </script>
</body>
</html>
